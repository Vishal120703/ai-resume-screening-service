version: "3.9"

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - redis

  worker:
    build: ./worker
    env_file:
      - ./worker/.env
    depends_on:
      - mongo
      - redis
    volumes:
    - ./prompts:/app/prompts

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
  